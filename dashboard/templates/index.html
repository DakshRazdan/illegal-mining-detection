<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISRO Mining Watch | Command Center</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0a0f1a',
                        saffron: '#FF9933',
                        indiaGreen: '#138808',
                        panelBg: 'rgba(255, 255, 255, 0.05)',
                        panelBorder: 'rgba(255, 255, 255, 0.1)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Globe -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-navy text-white font-sans overflow-hidden h-screen w-screen flex flex-col">

    <!-- Top Navigation Bar -->
    <nav class="h-16 border-b border-panelBorder bg-panelBg backdrop-blur-md flex items-center justify-between px-6 z-50 absolute w-full top-0">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 rounded-full bg-saffron animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-wider text-saffron">MINING WATCH <span class="text-white font-light text-sm ml-2">JHARKHAND</span></h1>
        </div>
        <div class="flex items-center space-x-6 text-sm">
            <div class="flex items-center space-x-2">
                <div id="system-status-indicator" class="w-2 h-2 rounded-full {% if pipeline_loaded %}bg-indiaGreen{% else %}bg-saffron{% endif %}"></div>
                <span class="text-gray-300">System: {% if pipeline_loaded %}ONLINE{% else %}STANDBY{% endif %}</span>
            </div>
            <span class="text-gray-500">RUN-ID: <span id="run-id-display">{{ run_id }}</span></span>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-1 mt-16 flex relative">
        
        <!-- 3D Globe Background Container -->
        <div id="canvas-container" class="absolute inset-0 z-0"></div>
        
        <!-- Overlay UI Panels (Glassmorphism) -->
        <div class="absolute inset-0 z-10 flex p-6 space-x-6 pointer-events-none">
            
            <!-- Left Panel: Pipeline Stats -->
            <div class="w-1/4 h-full flex flex-col space-y-4 pointer-events-auto">
                <div class="glass-panel p-5 flex-1 rounded-xl">
                    <h2 class="text-lg font-semibold border-b border-panelBorder pb-2 mb-4">Operations Metrics</h2>
                    <div class="space-y-4" id="stats-container">
                        <p class="text-sm text-gray-400">Loading telemetry data...</p>
                    </div>
                </div>
                
                <div class="glass-panel p-5 h-1/3 rounded-xl">
                    <h2 class="text-lg font-semibold border-b border-panelBorder pb-2 mb-4">Risk Distribution</h2>
                    <div class="flex h-4 bg-gray-800 rounded-full overflow-hidden mt-6" id="risk-bar">
                        <!-- Dynamic risk segments injected via JS -->
                    </div>
                    <div class="flex justify-between mt-2 text-xs text-gray-400" id="risk-labels">
                    </div>
                </div>
            </div>

            <!-- Middle Panel: spacer for globe focus -->
            <div class="flex-1 flex flex-col justify-end items-center pb-8 pointer-events-none">
                <button onclick="fetchLatestData()" class="pointer-events-auto glass-btn px-6 py-2 rounded-full text-sm font-medium hover:bg-white/10 transition">
                    REFRESH TELEMETRY
                </button>
            </div>

            <!-- Right Panel: Live Alert Feed -->
            <div class="w-1/3 h-full flex flex-col pointer-events-auto">
                <div class="glass-panel p-5 flex-1 rounded-xl flex flex-col">
                    <h2 class="text-lg font-semibold border-b border-panelBorder pb-2 mb-4 flex justify-between items-center">
                        Active Verification Feed
                        <span class="text-xs font-normal text-saffron bg-saffron/20 px-2 py-1 rounded">LIVE</span>
                    </h2>
                    
                    <div id="alerts-container" class="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar">
                        <p class="text-sm text-gray-400">Awaiting detection data...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
